name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.toml') }}

      - name: Run tests
        run: cargo test --all-features --verbose

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  live-db-tests:
    name: Live DB integration tests
    runs-on: ubuntu-latest
    # Separate job so a DB/container failure doesn't block the fast offline
    # signal. Drives scripts/test-live.sh which owns the full lifecycle:
    #   docker compose up --wait (seeded, healthchecked)
    #   cargo test --test live_mysql --test live_postgres -- --include-ignored
    #   docker compose down --volumes  (always, via trap EXIT)
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-live-cargo-registry-${{ hashFiles('**/Cargo.toml') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-live-cargo-build-${{ hashFiles('**/Cargo.toml') }}

      - name: Run live DB integration tests
        # bash invocation avoids relying on execute-bit surviving git checkout.
        # The script handles: compose up --wait, DSN exports, cargo test,
        # and compose down --volumes via trap EXIT (runs even on test failure).
        run: bash scripts/test-live.sh
        env:
          # Non-standard host ports to avoid collisions with any system DB
          # that might be present on the runner; these are the compose defaults,
          # set explicitly here so the job is self-documenting.
          PLENUM_TEST_MYSQL80_PORT: "43306"
          PLENUM_TEST_MYSQL84_PORT: "43307"
          PLENUM_TEST_POSTGRES16_PORT: "45432"
          RUST_BACKTRACE: "1"
